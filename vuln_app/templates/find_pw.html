{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-4">
            <div class="card-header bg-danger text-white text-center py-4">
                <h4 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i> 비밀번호 찾기 (재설정)</h4>
            </div>
            <div class="card-body p-4 p-md-5 bg-body">
                {% if message %}
                    <div class="alert alert-danger d-flex align-items-center rounded-3 mb-4" role="alert">
                        <i class="bi bi-exclamation-triangle-fill fs-4 me-3"></i>
                        <div>{{ message }}</div>
                    </div>
                {% endif %}
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-secondary fw-bold">계정 아이디</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-body-secondary border-end-0"><i class="bi bi-person text-secondary"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" name="username" placeholder="아이디 입력" required>
                        </div>
                    </div>
                    <div class="mb-5">
                        <label class="form-label text-secondary fw-bold">가입 이메일</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-body-secondary border-end-0"><i class="bi bi-envelope text-secondary"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" name="email" placeholder="example@test.com" required>
                        </div>
                        <div class="form-text mt-2"><i class="bi bi-exclamation-circle text-warning"></i> 인증번호 발송 절차 없이 아이디와 이메일 묶음만 일치하면 즉시 비밀번호 재설정 페이지로 넘어갑니다. (취약점: 계정 무단 탈취 위협)</div>
                    </div>
                    <button type="submit" class="btn btn-danger btn-lg w-100 fw-bold shadow">비밀번호 재설정 진행</button>
                </form>
            </div>
            <div class="card-footer bg-body-tertiary border-0 p-4 text-center">
                <a href="/login" class="text-decoration-none text-secondary small fw-bold"><i class="bi bi-arrow-left me-1"></i> 로그인 화면으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
