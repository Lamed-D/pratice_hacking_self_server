{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-5">
            <div class="card-header bg-dark text-white py-4 px-4 d-flex align-items-center">
                <i class="bi bi-pencil-square fs-3 me-3 text-warning"></i>
                <h4 class="mb-0 fw-bold">자유게시판 추천/수정</h4>
            </div>
            <div class="card-body p-4 p-md-5 bg-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">제목</label>
                        <input type="text" class="form-control form-control-lg bg-body-tertiary border-secondary shadow-sm" name="title" value="{{ post.title }}" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold d-flex justify-content-between align-items-center text-secondary">
                            <span>내용</span>
                            <span class="badge bg-danger text-white rounded-pill px-3"><i class="bi bi-bug-fill me-1"></i> Stored XSS 취약</span>
                        </label>
                        <textarea class="form-control bg-body-tertiary border-secondary shadow-sm" name="content" rows="12">{{ post.content }}</textarea>
                    </div>

                    {% if files %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary">기존 첨부파일</label>
                        <ul class="list-group list-group-flush mb-3">
                            {% for f in files %}
                            <li class="list-group-item bg-transparent px-0 text-secondary">
                                <i class="bi bi-file-earmark-text me-2"></i> {{ f.orig_name }}
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <div class="mb-5 border border-2 border-secondary border-opacity-25 p-4 rounded-4 bg-body-tertiary position-relative shadow-sm">
                        <label class="form-label fw-bold d-flex justify-content-between align-items-center text-secondary">
                            <span><i class="bi bi-paperclip fs-5 me-1"></i> 추가 첨부파일</span>
                        </label>
                        <input class="form-control form-control-lg shadow-sm" type="file" name="files" multiple>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="/post/{{ post.id }}" class="btn btn-outline-secondary btn-lg px-5 rounded-pill shadow-sm">취소</a>
                        <button type="submit" class="btn btn-warning btn-lg px-5 fw-bold text-dark rounded-pill shadow">수정완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
    const easymde = new EasyMDE({
        element: document.querySelector('textarea[name="content"]'),
        spellChecker: false,
        status: false,
        hideIcons: ["guide", "heading"]
    });
</script>
{% endblock %}
