<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>File Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark py-3">
                    <h3 class="mb-0">프로필 업로드 (Unrestricted File Upload 실습)</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label class="form-label fw-bold">프로필 이미지 선택</label>
                            <input class="form-control form-control-lg" type="file" name="file">
                        </div>
                        <button type="submit" class="btn btn-warning w-100 btn-lg mb-3">파일 업로드 (Upload)</button>
                    </form>
                    
                    {% if success_msg %}
                        <div class="alert alert-success mt-4 border-start border-success border-4 py-3">
                            <h5 class="alert-heading mb-2">업로드 성공!</h5>
                            <p class="mb-0">{{ success_msg }}</p>
                            <hr>
                            <a href="{{ file_path }}" target="_blank" class="btn btn-sm btn-outline-success">업로드된 파일 확인하기</a>
                        </div>
                    {% endif %}
                    
                    <hr>
                    <div class="alert alert-secondary border-start border-secondary border-4">
                        <h5 class="alert-heading">💡 공격 힌트</h5>
                        이미지 파일(`.png`, `.jpg`)만 올라가야 하지만, 확장자 검증 로직이 누락되어 있습니다.<br>
                        테스트용 HTML 문서나 파이썬 코드가 적힌 임의의 확장자 파일을 업로드하고 링크를 클릭해 보세요.
                    </div>
                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none text-secondary">← 메인으로 돌아가기</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
